<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 320px;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo { font-weight: bold; color: #3b82f6; font-size: 18px; }
        .score-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .score { font-size: 36px; font-weight: 800; color: #10b981; }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #1d4ed8; }
        .status { font-size: 12px; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">CloudGuard AI</div>
        <div class="status">v1.0</div>
    </div>
    <div class="score-box">
        <div class="score" id="score">--</div>
        <div style="font-size: 12px; color: #94a3b8;">Security Risk Score</div>
        <div class="status" id="provider">Detecting Cloud Session...</div>
    </div>
    <button class="btn" id="open-dashboard">Launch Admin Console</button>
    <script src="popup.js"></script>
</body>
</html>
