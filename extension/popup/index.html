<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.4);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            width: 320px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 24px;
            margin: 0;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo { 
            font-weight: 800; 
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .version { font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 0.1em; }

        .score-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 32px 24px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .score-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .score { 
            font-size: 48px; 
            font-weight: 800; 
            color: var(--success); 
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -0.05em;
        }

        .score-label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            border: 1px solid var(--border);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 100px;
            background: #64748b;
        }

        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn:hover { 
            background: #3b82f6; 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .btn:active { transform: translateY(0); }

        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon"></div>
            CloudGuard AI
        </div>
        <div class="version">V1.5 PRO</div>
    </div>
    
    <div class="score-card">
        <div class="score" id="score">--</div>
        <div class="score-label">Global Trust Score</div>
        
        <div class="status-badge">
            <div class="status-dot" id="status-indicator"></div>
            <span id="provider">Dectecting Session...</span>
        </div>
    </div>

    <button class="btn" id="open-dashboard">Admin Console</button>
    
    <div class="footer">
        Powered by AI Threat Intelligence
    </div>

    <script src="popup.js"></script>
</body>
</html>
